app-id: com.doubao.Murmur
# GNOME runtime: ships GTK4, PyGObject, and WebKitGTK 6.0 (the
# freedesktop runtime has none of these).
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: doubao-murmur

finish-args:
  # Display. The overlay windowing relies on X11 (XRecord global keys,
  # _NET_WM_STATE pinning), so prefer X11 even in mixed sessions.
  - --socket=x11
  - --socket=wayland
  - --share=ipc
  - --device=dri

  # Audio (microphone via PulseAudio compat layer over PipeWire)
  - --socket=pulseaudio

  # Network (WebSocket to ASR service, doubao.com login)
  - --share=network

  # Filesystem (config storage)
  - --filesystem=xdg-config/doubao-murmur:create

  # DBus (notifications, portals, flatpak-spawn for host xdotool paste)
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.Flatpak

  # System tray (StatusNotifierItem registration with KDE/compatible trays)
  - --talk-name=org.kde.StatusNotifierWatcher

  # Version-independent module path (see app module install step)
  - --env=PYTHONPATH=/app/lib/python/site-packages

modules:
  # PortAudio (for sounddevice)
  - name: portaudio
    buildsystem: cmake-ninja
    config-opts:
      - -DPA_USE_ALSA=ON
      - -DPA_USE_JACK=OFF
      - -DPA_USE_OSS=OFF
      - -DPA_BUILD_TESTS=OFF
      - -DPA_BUILD_EXAMPLES=OFF
      # portaudio 19.7's cmake_minimum_required predates the SDK's CMake 4
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    sources:
      - type: archive
        url: https://github.com/PortAudio/portaudio/archive/refs/tags/v19.7.0.tar.gz
        sha256: 5af29ba58bbdbb7bbcefaaecc77ec8fc413f0db6f4c4e286c40c3e1b83174fa0

  # Python dependencies. Network access during build is enabled in
  # build-args, so this manifest is for local builds (Flathub submission
  # would need pinned wheel sources instead).
  - name: python-deps
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - pip3 install --no-cache-dir --prefix=/app
        websockets sounddevice python-xlib

  # Main application
  - name: doubao-murmur
    buildsystem: simple
    build-commands:
      # Install to a python-version-independent path
      - mkdir -p /app/lib/python/site-packages
      - cp -r src/doubao_murmur /app/lib/python/site-packages/
      - mkdir -p /app/bin
      - |
        cat > /app/bin/doubao-murmur << 'LAUNCHER'
        #!/bin/sh
        SITE="/app/lib/python/site-packages"
        # pip-installed deps live under the runtime's python version dir
        for d in /app/lib/python3*/site-packages; do
          SITE="$SITE:$d"
        done
        export PYTHONPATH="$SITE:$PYTHONPATH"
        exec python3 -m doubao_murmur "$@"
        LAUNCHER
        chmod +x /app/bin/doubao-murmur
      - install -D flatpak/com.doubao.Murmur.desktop /app/share/applications/com.doubao.Murmur.desktop
      - install -D flatpak/com.doubao.Murmur.metainfo.xml /app/share/metainfo/com.doubao.Murmur.metainfo.xml
      - install -D flatpak/com.doubao.Murmur.svg /app/share/icons/hicolor/scalable/apps/com.doubao.Murmur.svg
    sources:
      - type: dir
        path: ..
